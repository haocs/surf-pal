name: SurfPal
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
targets:
  SurfPal:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: src
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surfpal.app
        PRODUCT_NAME: SurfPal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "Surf-Pal needs access to the camera to track surfers."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Surf-Pal needs access to the photo library to save your tracking videos."
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
    preBuildScripts:
      - name: Prepare CoreML Model
        script: |
          MODEL_PATH="${SRCROOT}/Resources/yolov8n.mlpackage"
          if [ ! -d "${MODEL_PATH}" ]; then
            echo "error: Missing CoreML model at ${MODEL_PATH}"
            echo "error: Run ./scripts/sync_model.sh (and generate with python3 models/export_coreml.py if needed)."
            exit 1
          fi

          COMPILED_DIR="${DERIVED_FILE_DIR}/CoreMLCompiled"
          APP_RESOURCES_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${COMPILED_DIR}" "${APP_RESOURCES_DIR}"

          rm -rf "${COMPILED_DIR}/yolov8n.mlmodelc"
          xcrun coremlcompiler compile "${MODEL_PATH}" "${COMPILED_DIR}"

          rm -rf "${APP_RESOURCES_DIR}/yolov8n.mlmodelc"
          cp -R "${COMPILED_DIR}/yolov8n.mlmodelc" "${APP_RESOURCES_DIR}/"
scheme:
  SurfPal:
    build:
      targets:
        SurfPal: all
    run:
      config: Debug
    archive:
      config: Release
